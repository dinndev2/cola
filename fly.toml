app = 'cola'
primary_region = 'sin'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false # Change this to false or "suspend"
  auto_start_machines = true
  min_machines_running = 1    # Keep 1 machine alive
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512