# fly.toml app configuration file generated for cola on 2026-03-27T01:17:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cola'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  protocol = "tcp"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
